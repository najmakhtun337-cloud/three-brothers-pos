<!-- Ei code automatic daily reset korbe 😈 -->

<script>

let today =
new Date().toLocaleDateString();

let savedDate =
localStorage.getItem("savedDate");

/* NEW DAY RESET */

if(savedDate !== today){

localStorage.removeItem("dailySales");

localStorage.setItem("savedDate",today);

}

/* SAVE SALES */

function saveSale(amount){

let sales =
JSON.parse(localStorage.getItem("dailySales")) || [];

sales.push(amount);

localStorage.setItem(

"dailySales",

JSON.stringify(sales)

);

}

/* SHOW TOTAL */

function showTotalSales(){

let sales =
JSON.parse(localStorage.getItem("dailySales")) || [];

let total = 0;

sales.forEach(item => {

total += item;

});

document.getElementById("todaySale").innerHTML =
"₹" + total;

}

showTotalSales();

</script>
