<!-- FILE NAME: admin.html -->

<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.box{
background:#1f1f1f;
padding:30px;
border-radius:20px;
text-align:center;
max-width:500px;
margin:auto;
}

h1{
color:gold;
}

.total{
font-size:60px;
margin-top:20px;
}

button{
padding:15px 30px;
margin-top:20px;
border:none;
background:red;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>

📊 TODAY SALES

</h1>

<div class="total" id="sale">

₹0

</div>

<button onclick="resetSales()">

❌ RESET SALES

</button>

</div>

<script>

function resetSales(){

localStorage.removeItem("dailySales");

location.reload();

}

</script>

</body>

</html>
